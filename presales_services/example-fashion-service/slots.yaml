id: 3D模型打印服务
required_base:
  - customer_name
  - model_file_type
  - print_dimensions_lwh
  - material_selection
  - color_requirements
  - layer_height_precision
  - infill_settings
  - sanding_required
  - polishing_required
  - additional_requirements
  - delivery_time
  - delivery_method
required_for_handoff: []
optional: []
meta:
  customer_name:
    label: 客户姓名
    desc: 客户称呼或姓名（用于方案抬头）
  model_file_type:
    label: 模型文件类型
    desc: 客户可提供的模型文件格式或文件类型，例如 STL、OBJ、STEP、3MF 等
  print_dimensions_lwh:
    label: 打印尺寸
    desc: 模型打印后的三维尺寸，按长 x 宽 x 高表达，例如 10cm x 8cm x 6cm；也可说明是否需要按比例缩放
  material_selection:
    label: 材料选择
    desc: 具体材料选择或材料偏好，例如 PLA、ABS、PETG、树脂等
  color_requirements:
    label: 颜色要求
    desc: 客户对成品颜色、单色/多色、喷涂或后期上色的要求
  layer_height_precision:
    label: 精度层厚
    desc: 打印精度或层厚要求，例如 0.1mm、0.2mm、普通精度、高精度等
  infill_settings:
    label: 填充率
    desc: 填充率打印内部结构要求
  sanding_required:
    label: 是否打磨
    desc: 是否需要打磨后处理
  polishing_required:
    label: 是否抛光
    desc: 是否需要抛光后处理
  additional_requirements:
    label: 额外要求
    desc: 其他特殊要求，例如耐温、承重、装配、表面效果、用途说明等
  delivery_time:
    label: 交付时间
    desc: 客户期望的交付日期
  delivery_method:
    label: 交付方式
    desc: 客户希望的交付方式，例如自取或者快递
